name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Build and deploy are separate jobs on purpose: GitHub Pages sometimes fails
# a deployment with a transient "Deployment failed, try again later", and
# re-running a failed single-job workflow re-uploads a SECOND "github-pages"
# artifact into the same run — which deploy-pages@v4 then permanently rejects
# ("Multiple artifacts named github-pages"). With the split, "Re-run failed
# jobs" re-runs only the deploy against the one existing artifact.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site with generated manifest
        run: |
          python3 make_manifest.py bundles
          mkdir -p site
          cp -r bundles site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
